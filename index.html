<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Seera ASM</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:    #1a1030;
      --purple: #6b3fa0;
      --mid:    #9b6fd4;
      --light:  #c9a8f0;
      --smoke:  #f3eefb;
      --white:  #ffffff;
      --card-shadow: 0 4px 24px rgba(107,63,160,0.13);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: #e5e7eb;
      overflow-x: hidden;
      position: relative;
    }

    /* no overlays — pure #e5e7eb background */

    /* ── Page wrap ── */
    #checkingScreen {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px;
    }
    .spinner-lg {
      width: 44px; height: 44px;
      border: 3px solid rgba(107,63,160,0.2); border-top-color: var(--purple);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    #checkingScreen p { color: var(--mid); font-family: 'Sora', sans-serif; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #mainUI {
      position: relative; z-index: 10;
      max-width: 440px; margin: 0 auto;
      padding: 48px 20px 40px;
      animation: pageIn 0.5s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .header {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 36px; gap: 14px;
    }
    .app-icon-wrap {
      width: 88px; height: 88px; border-radius: 22px;
      overflow: hidden; flex-shrink: 0;
      background: #ffffff;
      padding: 12px;
      box-shadow: 0 8px 32px rgba(107,63,160,0.25), 0 2px 8px rgba(0,0,0,0.10);
      animation: iconPop 0.6s cubic-bezier(.22,.68,0,1.4) 0.1s both;
      display: flex; align-items: center; justify-content: center;
    }
    .app-icon {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 0;
    }
    @keyframes iconPop {
      from { opacity: 0; transform: scale(0.7) rotate(-6deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
      font-family: 'Sora', sans-serif;
      font-size: 26px; font-weight: 800;
      color: var(--ink); text-align: center; letter-spacing: -0.5px;
    }
    .header-text h1 span { color: var(--purple); }
    .header-text p {
      color: var(--mid); font-size: 14px; text-align: center; margin-top: 4px;
    }

    /* ── Toggle ── */
    .toggle-row {
      display: flex; background: rgba(107,63,160,0.1);
      border-radius: 14px; padding: 4px; margin-bottom: 24px;
      gap: 4px;
    }
    .toggle-btn {
      flex: 1; padding: 11px 0;
      border: none; border-radius: 11px;
      font-family: 'Sora', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.25s cubic-bezier(.22,.68,0,1.2);
      background: transparent; color: var(--purple);
    }
    .toggle-btn.active {
      background: var(--purple); color: white;
      box-shadow: 0 4px 16px rgba(107,63,160,0.35);
      transform: scale(1.02);
    }

    /* ── Sections ── */
    .section { display: none; }
    .section.visible { display: block; animation: fadeSlide 0.3s ease both; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── URL card ── */
    .url-card {
      background: var(--white); border-radius: 20px;
      padding: 24px; box-shadow: var(--card-shadow);
      border: 1px solid rgba(107,63,160,0.08);
    }
    label {
      font-family: 'Sora', sans-serif;
      font-size: 11px; font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; color: var(--mid);
      display: block; margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; pointer-events: none;
    }
    input[type=text] {
      width: 100%; padding: 14px 14px 14px 42px;
      border: 1.5px solid rgba(107,63,160,0.18); border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; outline: none; color: var(--ink);
      background: var(--smoke);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type=text]:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(107,63,160,0.12);
      background: white;
    }
    .hint { font-size: 12px; color: #b0a0c8; margin-top: 8px; padding-left: 2px; }

    .remember-row {
      display: flex; align-items: center; gap: 10px; margin-top: 16px;
      padding: 12px 14px; background: var(--smoke); border-radius: 10px;
    }
    .remember-row input[type=checkbox] {
      width: 17px; height: 17px; cursor: pointer; accent-color: var(--purple); flex-shrink: 0;
    }
    .remember-row span { font-size: 13px; color: #6b5a8a; cursor: pointer; line-height: 1.4; }

    .go-btn {
      width: 100%; margin-top: 16px; padding: 15px;
      background: linear-gradient(135deg, var(--purple) 0%, #4a2580 100%);
      color: white; border: none; border-radius: 14px;
      font-family: 'Sora', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 6px 20px rgba(107,63,160,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.2px;
    }
    .go-btn:not(:disabled):active { transform: scale(0.97); box-shadow: 0 3px 10px rgba(107,63,160,0.3); }
    .go-btn:disabled { opacity: 0.65; cursor: not-allowed; }
    .btn-spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.35); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
    }
    .msg { display: none; margin-top: 12px; padding: 12px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; }
    .msg.error   { background: #fff0f4; color: #b0243a; border: 1px solid #f7c0cb; }
    .msg.warning { background: #fffbea; color: #92660a; border: 1px solid #f0d080; }
    .msg.success { background: #f0fbf4; color: #1e7a45; border: 1px solid #88d4a8; }

    /* ── Sites section ── */
    .sites-remember {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px; padding: 13px 16px;
      background: white; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(107,63,160,0.08);
      border: 1px solid rgba(107,63,160,0.08);
    }
    .sites-remember input[type=checkbox] {
      width: 17px; height: 17px; cursor: pointer; accent-color: var(--purple); flex-shrink: 0;
    }
    .sites-remember span { font-size: 13px; color: #6b5a8a; }

    .section-label {
      font-family: 'Sora', sans-serif;
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--light);
      margin-bottom: 12px; padding-left: 2px;
    }

    /* ── Site cards ── */
    .site-card {
      background: white; border-radius: 18px;
      padding: 16px 18px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(107,63,160,0.07);
      cursor: pointer; width: 100%; text-align: left;
      transition: transform 0.18s cubic-bezier(.22,.68,0,1.3), box-shadow 0.18s;
      position: relative; overflow: hidden;
    }
    .site-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--mid), var(--purple));
      opacity: 0; transition: opacity 0.2s;
    }
    .site-card:not(:disabled):active,
    .site-card:not(:disabled):focus {
      transform: scale(0.98); box-shadow: 0 2px 10px rgba(107,63,160,0.15);
    }
    .site-card:not(:disabled):hover {
      transform: translateY(-2px); box-shadow: 0 8px 28px rgba(107,63,160,0.2);
    }
    .site-card:not(:disabled):hover::before { opacity: 1; }

    /* staggered entrance */
    .site-card:nth-child(1) { animation: cardIn 0.4s 0.05s both; }
    .site-card:nth-child(2) { animation: cardIn 0.4s 0.12s both; }
    .site-card:nth-child(3) { animation: cardIn 0.4s 0.19s both; }
    .site-card:nth-child(4) { animation: cardIn 0.4s 0.26s both; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .site-icon {
      width: 46px; height: 46px; min-width: 46px;
      border-radius: 13px;
      background: linear-gradient(135deg, #ede0ff, #d8c0f8);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(107,63,160,0.18);
    }
    .site-info {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; justify-content: center; gap: 2px;
    }
    .site-info h3 {
      font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 700; color: var(--ink);
      line-height: 1.3; margin: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .site-info p {
      font-size: 12px; color: var(--mid);
      line-height: 1.3; margin: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .site-arrow {
      color: var(--light); font-size: 20px; flex-shrink: 0; line-height: 1;
      transition: transform 0.2s, color 0.2s;
    }
    .site-card:hover .site-arrow { transform: translateX(3px); color: var(--purple); }

    /* ── Footer tag ── */
    .footer-tag {
      text-align: center; margin-top: 32px;
      font-size: 11px; color: #c0aee0; letter-spacing: 0.5px;
    }
  </style>
</head>

    </div>

    <p class="footer-tag">Powered by Seera Arabia ·</p>

  </div>

  <script>
    const STORAGE_KEY  = 'seera_last_site';
    const REMEMBER_KEY = 'seera_remember_me';

    (function() {
      const remember = localStorage.getItem(REMEMBER_KEY) === 'true';
      const lastSite = localStorage.getItem(STORAGE_KEY);
      if (remember && lastSite) {
        window.location.href = lastSite + '/entry';
        return;
      }
      showMain();
    })();

    function showMain() {
      document.getElementById('checkingScreen').style.display = 'none';
      document.getElementById('mainUI').style.display = 'block';
    }

    function showSection(name, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('section-' + name).classList.add('visible');
      btn.classList.add('active');
    }

    function savePreference(origin) {
      const rememberUrl  = document.getElementById('rememberUrl');
      const rememberSite = document.getElementById('rememberSite');
      const checked = (rememberUrl && rememberUrl.closest('.section.visible'))
                        ? rememberUrl.checked
                        : rememberSite ? rememberSite.checked : false;
      if (checked) {
        localStorage.setItem(REMEMBER_KEY, 'true');
        localStorage.setItem(STORAGE_KEY, origin);
      } else {
        localStorage.removeItem(REMEMBER_KEY);
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function openSite(origin) {
      savePreference(origin);
      window.location.href = origin + '/entry';
    }

    function normalizeUrl(raw) {
      raw = raw.trim();
      if (!raw) return null;
      if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
      try {
        const u = new URL(raw);
        u.pathname = '/entry';
        return u.toString();
      } catch(e) { return null; }
    }

    function showMsg(type, text) {
      const box = document.getElementById('msgBox');
      box.className = 'msg ' + type;
      box.textContent = text;
      box.style.display = 'block';
    }
    function hideMsg() { document.getElementById('msgBox').style.display = 'none'; }

    function setLoading(on) {
      document.getElementById('goBtn').disabled = on;
      document.getElementById('btnSpinner').style.display = on ? 'block' : 'none';
      document.getElementById('btnText').textContent = on ? 'Checking…' : 'Open App →';
    }

    function goToSite() {
      const raw = document.getElementById('siteUrl').value;
      hideMsg();
      if (!raw.trim()) { showMsg('error', '⚠️ Please enter a URL first.'); return; }
      const url = normalizeUrl(raw);
      if (!url) { showMsg('error', '⚠️ Invalid URL. Please check and try again.'); return; }

      setLoading(true);
      showMsg('warning', '🔍 Checking site…');

      fetch(url.replace('/entry', '/asm_app/'), {
        method: 'HEAD', mode: 'no-cors', signal: AbortSignal.timeout(6000)
      })
      .then(() => {
        savePreference(new URL(url).origin);
        showMsg('success', '✅ Site found! Opening…');
        setTimeout(() => { window.location.href = url; }, 600);
      })
      .catch(err => {
        setLoading(false);
        if (err.name === 'TimeoutError' || err.name === 'AbortError') {
          showMsg('error', '⏱️ Request timed out. No site found at this URL.');
        } else {
          showMsg('error', '❌ No site found at this URL. Please check and try again.');
        }
      });
    }

    document.getElementById('siteUrl').addEventListener('keydown', e => {
      if (e.key === 'Enter') goToSite();
    });
    document.getElementById('siteUrl').addEventListener('input', () => {
      hideMsg(); setLoading(false);
    });
  </script>
</body>
</html>
